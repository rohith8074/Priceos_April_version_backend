version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/auth/status"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - priceos-network

networks:
  priceos-network:
    driver: bridge
